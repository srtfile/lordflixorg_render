<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LordFlix Extractor</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --border: #252a38;
      --accent: #e50914;
      --accent-dim: #7a0509;
      --text: #e8eaf0;
      --muted: #7b8299;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
      --mono: 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    header .logo span { color: var(--text); }
    header .badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 28px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    select option { background: var(--bg); }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .type-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .series-fields { display: none; }
    .series-fields.show { display: grid; }

    .field { display: flex; flex-direction: column; }

    .fetch-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }

    .fetch-btn:hover { opacity: 0.87; }
    .fetch-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Result area */
    #result-section { display: none; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .status-bar.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
    .status-bar.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--red); }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .meta-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .meta-chip strong { color: var(--text); }

    .output-box {
      background: #090b10;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      font-family: var(--mono);
      font-size: 0.83rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a8c8ff;
      max-height: 480px;
      overflow-y: auto;
      position: relative;
    }

    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--border);
      border: none;
      border-radius: 5px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--accent); color: #fff; }

    .output-wrap { position: relative; }

    /* Loader */
    .loader {
      display: none;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 20px;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Lord<span>Flix</span></div>
  <div class="badge">Extractor</div>
</header>

<main>
  <h2>Media Lookup</h2>

  <div class="card">
    <div class="type-toggle">
      <button class="type-btn active" onclick="setType('movie')">🎬 Movie</button>
      <button class="type-btn" onclick="setType('series')">📺 Series</button>
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="field">
        <label>Title</label>
        <input id="title" type="text" placeholder="e.g. Game of Thrones" />
      </div>
      <div class="field">
        <label>Year</label>
        <input id="year" type="text" placeholder="e.g. 2011" />
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="field">
        <label>IMDB ID</label>
        <input id="imdb_id" type="text" placeholder="e.g. tt0944947" />
      </div>
      <div class="field">
        <label>TMDB ID</label>
        <input id="tmdb_id" type="text" placeholder="e.g. 1399" />
      </div>
    </div>

    <div class="grid-3 series-fields" id="series-fields" style="margin-bottom:16px">
      <div class="field">
        <label>Season</label>
        <input id="season" type="number" placeholder="1" min="1" />
      </div>
      <div class="field">
        <label>Episode</label>
        <input id="episode" type="number" placeholder="1" min="1" />
      </div>
      <div></div>
    </div>

    <div class="field">
      <label>Server</label>
      <select id="server">
        {% for s in servers %}
        <option value="{{ s.name }}">{{ s.name }}</option>
        {% endfor %}
        {% if not servers %}
        <option value="">Loading servers…</option>
        {% endif %}
      </select>
    </div>

    <button class="fetch-btn" id="fetch-btn" onclick="fetchMedia()">Fetch Stream Data</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span>Fetching and decrypting stream data…</span>
    </div>
  </div>

  <!-- Result -->
  <div id="result-section">
    <h2>Result</h2>
    <div class="card">
      <div id="status-bar" class="status-bar"></div>
      <div class="meta-row" id="meta-row"></div>
      <div class="output-wrap">
        <div class="output-box" id="output"></div>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
    </div>
  </div>
</main>

<script>
  let mediaType = 'movie';

  function setType(t) {
    mediaType = t;
    document.querySelectorAll('.type-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && t === 'movie') || (i === 1 && t === 'series'));
    });
    const sf = document.getElementById('series-fields');
    if (t === 'series') sf.classList.add('show');
    else sf.classList.remove('show');
  }

  async function fetchMedia() {
    const title    = document.getElementById('title').value.trim();
    const year     = document.getElementById('year').value.trim();
    const imdb_id  = document.getElementById('imdb_id').value.trim();
    const tmdb_id  = document.getElementById('tmdb_id').value.trim();
    const server   = document.getElementById('server').value;
    const season   = document.getElementById('season').value;
    const episode  = document.getElementById('episode').value;

    if (!title || !year || !imdb_id || !tmdb_id || !server) {
      alert('Please fill in Title, Year, IMDB ID, TMDB ID, and Server.');
      return;
    }
    if (mediaType === 'series' && (!season || !episode)) {
      alert('Please fill in Season and Episode for series.');
      return;
    }

    const btn = document.getElementById('fetch-btn');
    btn.disabled = true;
    document.getElementById('loader').classList.add('show');
    document.getElementById('result-section').style.display = 'none';

    const body = { title, type: mediaType, year, imdb_id, tmdb_id, server };
    if (mediaType === 'series') { body.season = season; body.episode = episode; }

    try {
      const res = await fetch('/fetch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      showResult(data, { title, year, imdb_id, tmdb_id, server, season, episode });
    } catch (e) {
      showResult({ ok: false, error: String(e) }, {});
    } finally {
      btn.disabled = false;
      document.getElementById('loader').classList.remove('show');
    }
  }

  function showResult(data, meta) {
    const section  = document.getElementById('result-section');
    const statusEl = document.getElementById('status-bar');
    const outputEl = document.getElementById('output');
    const metaEl   = document.getElementById('meta-row');

    section.style.display = 'block';

    if (data.ok) {
      statusEl.className = 'status-bar success';
      statusEl.innerHTML = '<div class="dot green"></div> Stream data fetched and decrypted successfully';

      const chips = [
        meta.title && `<div class="meta-chip"><strong>Title:</strong> ${meta.title}</div>`,
        meta.year  && `<div class="meta-chip"><strong>Year:</strong> ${meta.year}</div>`,
        meta.server && `<div class="meta-chip"><strong>Server:</strong> ${meta.server}</div>`,
        meta.season && `<div class="meta-chip"><strong>S${meta.season}E${meta.episode}</strong></div>`,
        data.referer && `<div class="meta-chip"><strong>Referer:</strong> ${data.referer}</div>`,
      ].filter(Boolean).join('');
      metaEl.innerHTML = chips;

      const result = data.result;
      if (typeof result === 'object') {
        outputEl.textContent = JSON.stringify(result, null, 2);
      } else {
        outputEl.textContent = result;
      }
    } else {
      statusEl.className = 'status-bar error';
      statusEl.innerHTML = '<div class="dot red"></div> Error fetching stream data';
      metaEl.innerHTML = '';
      outputEl.textContent = data.error || 'Unknown error';
    }

    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  }

  // Pre-fill GoT example
  document.getElementById('title').value = 'Game of Thrones';
  document.getElementById('year').value = '2011';
  document.getElementById('imdb_id').value = 'tt0944947';
  document.getElementById('tmdb_id').value = '1399';
  document.getElementById('season').value = '1';
  document.getElementById('episode').value = '2';
  setType('series');

  // Refresh servers if none loaded
  {% if not servers %}
  fetch('/servers').then(r => r.json()).then(servers => {
    const sel = document.getElementById('server');
    sel.innerHTML = servers.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  });
  {% endif %}
</script>
</body>
</html>
